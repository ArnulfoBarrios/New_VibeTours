name: vibetoursapp
description: VIBETOURS, a premium AI-powered tourism guide for Android and iOS.
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  audioplayers: ^6.5.1
  cached_network_image: ^3.4.1
  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  flutter_riverpod: ^2.6.1
  flutter_tts: ^4.2.3
  geolocator: ^14.0.2
  go_router: ^17.0.1
  google_sign_in: ^7.2.0
  http: ^1.6.0
  intl: ^0.20.2
  lottie: ^3.3.2
  maplibre_gl: ^0.23.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  sqflite: ^2.3.0
  path: ^1.9.0
  speech_to_text: ^7.3.0
  supabase_flutter: ^2.10.3
  url_launcher: ^6.3.2
  image_picker: ^1.2.2
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_messaging: ^16.4.1
  firebase_analytics: ^12.4.3
  firebase_crashlytics: ^5.2.4
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/lottie/ai_pulse.json
    - assets/config/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/icon_fallback.png"
  adaptive_icon_background: "#3b82f6"
  adaptive_icon_foreground: "assets/images/icon_foreground.png"
